<!DOCTYPE html>
<html>

<head>
    <style>
        *
        {
            font-size: 50px;
            font-family: Arial, Helvetica, sans-serif;
            padding-left:10px;
        }
        .btn
        {
            background-color:burlywood;
            border: solid 3px ;
            border-radius: 12px;
            border-bottom-left-radius: 0px;
            border-bottom-right-radius: 0px;
        }
        .btn:hover
        {
            background-color: rgb(235, 200, 155);
        }
        .btn:active
        {
            background-color:rgb(224, 163, 84);
        }
        .cont
        {
            background-color: rgb(17, 17, 17);
            width: 200px;
            padding-right: 0px;
            padding-left: 0px;
            padding-bottom:0px;
            padding-top:0px;
            margin:0px;
            display: none;
            float: left;
        }
        .navor
        {
            color:white;
            background-color: rgb(94, 94, 94);
            width:100%;
            float:bottom;

        }
        .navor:hover
        {
            background-color: rgb(80,80,80) ;
        }
        button
        {
            cursor: pointer;
        }
        .btnh:hover .cont
        {
            display: block;
        }
        .btnh
        {
            margin:0px;
            width:200px;
        }
        .contA
        {
            margin:0px;
            padding:0px;
            
        }













    </style>
</head>


<body>
    <h3>Dropable hover</h3>
    <br>
    <div class="btnh">
        <button class="btn">HOVER</button>
            <div class="cont">
                <button class="navor">home</button>
                <button class="navor">about</button>
            </div>
            
        
    </div>








</body>


</html>
