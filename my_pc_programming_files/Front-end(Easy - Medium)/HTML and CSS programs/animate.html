<!DOCTYPE html>
<html>
    <head>
        <style>
            html
            {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 50px;
                padding: 100px;
            }
            div
            {
                display: inline-block;
                margin-left: 10px;
            }
            #normal
            {
                transform: translateY(-10px);
                font-weight: 200;
            }
            #spec
            {
                width:fit-content;
                height:50px;
                padding-left:10px;
                padding-right:10px;
                padding-bottom: 6px;
                border-radius: 0px;
                overflow-y: hidden;
                border-radius: 0px;
            }
            #one
            {
                color:rgb(233, 24, 66);
            }
            #two
            {
                color: rgb(54, 83, 247);
            }
            b
            {
                display: block;
                animation-name: animate;
                animation-duration: 4s;
                animation-timing-function: ease-in-out;
                animation-iteration-count: infinite;
                animation-delay:1.25s;

                
            }
            @keyframes animate
            {
                0%  {transform: translateY(0px);}
                10% {transform: translateY(-58.025px);}
                50% {transform: translateY(-58.025px);}
                60% {transform: translateY(-116.05px);}
                100%{transform: translateY(-116.05px);}
            }

        </style>
    </head>
    <body>

        <div id="normal">we are</div><div id="spec"><b id="one">dymanic</b>

                                                    <b id="two">leaders</b>

                                                    <b id="one">dymanic</b>
        </div>


    </body>
</html>
