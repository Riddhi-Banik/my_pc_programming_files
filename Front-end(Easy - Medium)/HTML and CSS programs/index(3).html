<!DOCTYPE html>
<html>
    <head><title>PAGE LAYOUT</title>
        <style>
                 *{ margin: 10px;}
                #warpper
                {background-color:gray;
                width:auto;
                height:900px;
                margin:20px;;
                border:solid;}
                #header
                {width:auto;
                height: 150px;
                background-color:orange;
                border:solid;}
                #logo{margin:10px;
                background-color:yellow;
                width:100px;
                height:100px;
                border-radius:25px;
                border:solid;}
                #navbar{background-color: green;
                width:auto;
                height:75px;
                border:solid;}
                #container{background-color: red;
                margin:10px;
                width:auto;
                height:500px;
                border:solid;}
                #left-panel{background-color: cyan;
                float:left;
                width:24%;
                height:460px;
                margin:20px;
                border:solid;}
                #right-section{background-color:navy;
                float:right;
                
                width:auto;
                
                height:460px;
                margin-top:20px;
                
                border:solid}
                #footer{background-color: green;
                width:auto;
                height:75px;
                border:solid;}
                a:hover{color:white;}
                




        </style>


    </head>
    <body>   
        <div id="warpper">
            <div id="header">
                 <div id="logo"></div>
            </div>
            <div id="navbar"><a href="http://www.google.com">Google</a>
            <ul> 
  
                
            </ul>
            
            </div>
            <div id="container">
                <div id="left-panel"></div>
                <div id="right-section"></div>
            </div>
            <div id="footer"></div>
        </div>


    </body>

</html>
