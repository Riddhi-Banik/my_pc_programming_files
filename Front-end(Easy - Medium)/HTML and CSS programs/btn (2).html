<!DOCTYPE html>
<html>
    <head>
        <style>
            *
            {
                margin: 0px;
                padding: 0px;
                font-size: 50px;
                font-family: arial;
            }
            html
            {
                padding-left: 80px;
                padding-top: 40px;
            }
            button
            {
                padding: 15px;
                border-style: solid;
                border-radius: 20px;
                color: rgb(34, 95, 255);
                font-weight: 700;
                background-color: rgb(219, 229, 255);
                border-width: 3px;
                border-color: rgb(34, 95, 255);
                position: relative;
                top: 70px;

            }
            button:hover
            {
                padding: 15px;
                border-style: solid;
                border-radius: 20px;
                color: rgb(9, 79, 255);
                font-weight: 700;
                background-color: rgb(188, 207, 255);
                border-width: 3px;
                border-color: rgb(34, 95, 255);
                position: relative;
                transform: translate(0, 2px);
                transition-timing-function: ease-in-out;
                transition-duration: 0.2s;
                cursor: pointer;
                top: 70px;
            }
            button:active
            {
                padding: 15px;
                border-style: solid;
                border-radius: 20px;
                color: rgb(0, 68, 241);
                font-weight: 700;
                background-color: rgb(166, 191, 255);
                border-width: 3px;
                border-color: rgb(34, 95, 255);
                position: relative;
                transform: translate(0, 5px);
                transition-timing-function: ease-in-out;
                transition-duration: 0.2s;
                cursor:pointer;
                top: 70px;
            }
            #BUTTON-LOG
            {
                padding: 15px;
                border-style: solid;
                border-radius: 20px;
                color: rgb(34, 95, 255);
                font-weight: 700;
                background-color: rgb(194, 211, 255);
                border-width: 3px;
                border-color: rgb(9, 79, 255);
                position: relative;
                z-index: -1;
            }
            #decoy
            {
                visibility: hidden;
            }

        </style>
    </head>
    <body>
        <div style="display:inline-block; margin-top: 50px;">
            <button>
             HOME
            </button>
            <div id="BUTTON-LOG">
             <u id="decoy">HOME</u>
            </div>
        </div>
    </body>
</html>
